{% extends 'hospital/base.html' %}
{% block title %}Book Appointment{% endblock %}

{% block content %}
<div class="container" style="padding-bottom:40px;">

    <div class="page-header">
        <h2>Book New Appointment</h2>
        <a href="{% url 'appointments' %}" class="btn btn-danger">← Back</a>
    </div>

    <form method="POST" action="{% url 'add_appointment' %}">
        {% csrf_token %}

        <div class="form-row">
            <div>
                <label for="id_patient">Select Patient *</label>
                {{ form.patient }}
            </div>
            <div>
                <label for="id_doctor">Select Doctor *</label>
                {{ form.doctor }}
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="id_date">Appointment Date *</label>
                {{ form.date }}
            </div>
            <div>
                <label for="id_time">Appointment Time</label>
                {{ form.time }}
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="id_status">Status</label>
                {{ form.status }}
            </div>
        </div>

        <label for="id_notes">Notes (optional)</label>
        {{ form.notes }}

        <button type="submit">Book Appointment</button>
    </form>

</div>
{% endblock %}
